services:

  mastr-tool:
    pull_policy: if_not_present
    image: mastr-tool:latest
    build: .
    container_name: mastr-tool
    restart: unless-stopped
    user: 1000:1000
    environment:
      MASTR_FORCE_USING_EXISTING_DUMP: "${MASTR_FORCE_USING_EXISTING_DUMP:-false}" # use existing dump and do not download
    volumes:
      - ${MASTR_CACHE_DIR}:/mastr/cache
      - ${MASTR_OUTPUT_DIR}:/mastr/output
    depends_on:
      db:
        condition: service_healthy

  mastr-static:
    pull_policy: if_not_present
    image: mastr-static:latest
    build: httpd-static
    container_name: mastr-static
    restart: unless-stopped
    volumes:
      - ${MASTR_OUTPUT_DIR}:/var/www/mastr-output/:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - mastr-tool

  db:
    image: docker.io/postgres:18-bookworm
    restart: unless-stopped
    container_name: mastr-db
    environment:
      - POSTGRES_USER=mastr
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mastr
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/18/data
    command: >
      postgres
      -c max_wal_size=4GB
      -c min_wal_size=1GB
      -c checkpoint_timeout=15min
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c wal_compression=on
      -c shared_buffers=512MB
      -c maintenance_work_mem=256MB
      -c synchronous_commit=off
      -c bgwriter_lru_maxpages=200
      -c bgwriter_delay=50ms
    volumes:
      - mastr-database:/var/lib/postgresql/18/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mastr -d mastr" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MaStR WebUI
  mastr-app:
    pull_policy: if_not_present
    image: mastr-app:latest
    build: ../mastr-app
    container_name: mastr-app
    restart: unless-stopped
    environment:
      MASTR_STATIC_URL: http://mastr-static:8080
      MASTR_STATIC_PUBLIC_URL: ${MASTR_STATIC_PUBLIC_URL}
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - mastr-static

volumes:
  mastr-database: